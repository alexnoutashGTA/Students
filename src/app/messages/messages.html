<form (ngSubmit)="onUserSave()" [formGroup]="submitForm" class="message-form">
    <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="userName" />
    </div>

    <div class="form-group">
        <label for="message">Message</label>
        <input id="message" type="text" formControlName="message"  />
    </div>

    <div class="form-group">
        <label for="date">Date and Time</label>
        <input id="date" type="date" formControlName="date" />
    </div>

    <button type="submit" class="submit-btn">Send Message</button>
</form>


  <!-- Chat Section -->
  <main class="chat-section">
    <header>
      <h1>Messages</h1>
      <p>Welcome back, Vishal! Who would you like to chat with?</p>
    </header>

    <div class="chat-layout">
      <!-- Contacts -->
      <aside class="contacts">
        <ul>
          <li>Vihaan</li>
          <li>Neha</li>
          <li>Sana</li>
          <li>Riya</li>
          <li>Ayaan</li>
          <li>Tarun</li>
          <li>Megha</li>
        </ul>
      </aside>

      <!-- Chat Box -->
      <section class="chat-box">
        <div class="messages">
          <p><strong>Vihaan:</strong> Hi Vishal!</p>
          <p><strong>You:</strong> Hello! How are you?</p>
        </div>
        <div class="chat-input">
          <input type="text" placeholder="Type your message..." />
          <button>Send</button>
        </div>
      </section>
    </div>
  </main>
